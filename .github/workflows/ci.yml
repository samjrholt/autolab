name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true

      - name: Lint
        run: pixi run lint

      - name: Test
        run: pixi run test

      - name: Frontend install
        run: pixi run frontend-install

      - name: Frontend build
        run: pixi run frontend-build
